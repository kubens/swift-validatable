name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: swift-format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: swift format lint --strict --recursive ./

  test-macos:
    name: Test · macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run tests
        run: swift test

  test-linux:
    name: Test · Linux
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run tests
        run: swift test

  test-simulators:
    name: Test · ${{ matrix.platform }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: platform=iOS Simulator,OS=latest,name=iPhone 17
          - platform: tvOS
            destination: platform=tvOS Simulator,OS=latest,name=Apple TV 4K (3rd generation)
          - platform: watchOS
            destination: platform=watchOS Simulator,OS=latest,name=Apple Watch Series 11 (46mm)
          - platform: visionOS
            destination: platform=visionOS Simulator,OS=latest,name=Apple Vision Pro
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme swift-validatable \
            -destination '${{ matrix.destination }}' \
            | xcpretty
